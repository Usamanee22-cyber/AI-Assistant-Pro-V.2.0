<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แบบทดสอบวิทยาศาสตร์กายภาพ (เคมี)</title>
    <style>
        body {
            font-family: 'Sarabun', sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            padding: 20px;
        }
        .quiz-container {
            background-color: white;
            width: 100%;
            max-width: 700px;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h1 { text-align: center; color: #2c3e50; }
        .question { margin-bottom: 25px; display: none; }
        .question.active { display: block; }
        .question-text { font-size: 1.2rem; margin-bottom: 15px; font-weight: bold; }
        .options { list-style: none; padding: 0; }
        .option {
            background: #eef2f3;
            margin: 10px 0;
            padding: 12px 15px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }
        .option:hover { background: #d1d8e0; }
        .option.selected { background: #3498db; color: white; }
        .controls { display: flex; justify-content: space-between; margin-top: 20px; }
        button {
            padding: 10px 25px;
            border: none;
            border-radius: 5px;
            background: #27ae60;
            color: white;
            cursor: pointer;
            font-size: 1rem;
        }
        button:disabled { background: #bdc3c7; }
        #result-area { text-align: center; display: none; }
    </style>
</head>
<body>

<div class="quiz-container">
    <h1>🧬 วิทยาศาสตร์กายภาพ (เคมี)</h1>
    <hr>
    <div id="quiz-area">
        </div>

    <div class="controls">
        <button id="prev-btn" onclick="changeQuestion(-1)" disabled>ก่อนหน้า</button>
        <button id="next-btn" onclick="changeQuestion(1)">ถัดไป</button>
    </div>

    <div id="result-area">
        <h2>สรุปคะแนนของคุณ</h2>
        <p id="score-text" style="font-size: 2rem; font-weight: bold; color: #2ecc71;"></p>
        <button onclick="location.reload()">ทำแบบทดสอบใหม่</button>
    </div>
</div>

<script>
    const questions = [
        {
            q: "1. การทดสอบสารอาหารชนิดใดที่เมื่อหยดสารละลายไอโอดีนแล้วจะเปลี่ยนจากสีน้ำตาลแกมเหลืองเป็นสีน้ำเงินเข้ม?",
            options: ["โปรตีน", "ไขมัน", "แป้ง", "น้ำตาลโมเลกุลเดี่ยว"],
            ans: 2
        },
        {
            q: "2. ข้อใดกล่าวถูกต้องเกี่ยวกับพอลิเมอร์แบบกิ่ง (Branched Polymer)?",
            options: ["มีความหนาแน่นสูงและแข็งมาก", "ทนความร้อนได้สูงกว่าแบบร่างแห", "มีความยืดหยุ่นและจุดหลอมเหลวต่ำกว่าแบบเส้น", "เป็นโครงสร้างของเมลามีน"],
            ans: 2
        },
        {
            q: "3. แก๊สชนิดใดที่เป็นสาเหตุหลักของการเกิด 'ฝนกรด' (Acid Rain)?",
            options: ["CO2 และ CH4", "SO2 และ NOx", "CFCs", "O3"],
            ans: 1
        },
        {
            q: "4. สารทำความสะอาดชนิดใดที่มีสมบัติกำจัดคราบไขมันได้ดีทั้งในน้ำอ่อนและน้ำกระด้าง?",
            options: ["สบู่", "ผงซักฟอก (Detergent)", "น้ำปูนใส", "สารละลายโซดาไฟ"],
            ans: 1
        },
        {
            q: "5. พลาสติกประเภท PET (Polyethylene Terephthalate) มักนำไปใช้ทำผลิตภัณฑ์ใด?",
            options: ["ถุงหูหิ้ว", "ท่อน้ำประปา", "ขวดน้ำดื่มใส", "กล่องโฟมบรรจุอาหาร"],
            ans: 2
        },
        {
            q: "6. ปฏิกิริยาการเผาไหม้แบบสมบูรณ์ของเชื้อเพลิงฟอสซิล จะได้ผลิตภัณฑ์เป็นสารใด?",
            options: ["CO และ H2O", "CO2 และ H2O", "CO2 และเขม่า", "SO2 และ O2"],
            ans: 1
        },
        {
            q: "7. สารละลายเบเนดิกต์ (Benedict's solution) ใช้ทดสอบน้ำตาลชนิดใดแล้ว 'ไม่' เกิดตะกอนสีแดงอิฐ?",
            options: ["กลูโคส", "ฟรักโทส", "มอลโทส", "ซูโครส"],
            ans: 3
        },
        {
            q: "8. (ระดับยาก) ข้อใดอธิบายกลไกการทำงานของสบู่ในการกำจัดคราบไขมันได้ถูกต้องที่สุด?",
            options: ["ส่วนมีขั้วจับกับน้ำ และส่วนไม่มีขั้วจับกับไขมัน", "ส่วนไม่มีขั้วจับกับน้ำ และส่วนมีขั้วจับกับไขมัน", "สบู่ทำปฏิกิริยาเปลี่ยนไขมันเป็นน้ำ", "สบู่ลดอุณหภูมิของน้ำทำให้ไขมันหลุดออก"],
            ans: 0
        },
        {
            q: "9. (ระดับยาก) เมื่อพลาสติกประเภทเทอร์โมเซต (Thermosetting plastic) ได้รับความร้อนสูงจะเกิดผลอย่างไร?",
            options: ["อ่อนตัวและหลอมเหลวเพื่อนำกลับมาหล่อใหม่ได้", "ไม่อ่อนตัวแต่จะแตกหักหรือไหม้เกรียมหากความร้อนสูงเกินไป", "เปลี่ยนรูปร่างเป็นเส้นใย", "หดตัวกลายเป็นเม็ดพลาสติกขนาดเล็ก"],
            ans: 1
        },
        {
            q: "10. (ระดับยาก) ข้อใดคือผลกระทบโดยตรงของปรากฏการณ์ 'หมอกควัน' (Smog) ที่เกิดจากปฏิกิริยาเคมีในบรรยากาศ?",
            options: ["การเพิ่มขึ้นของระดับน้ำทะเล", "การทำลายชั้นโอโซนในบรรยากาศชั้นบน", "การระคายเคืองระบบทางเดินหายใจและทัศนวิสัยลดลง", "การทำให้ดินมีสภาพเป็นเบส"],
            ans: 2
        }
    ];

    let currentIdx = 0;
    let userAnswers = new Array(questions.length).fill(null);

    function displayQuestion() {
        const quizArea = document.getElementById('quiz-area');
        quizArea.innerHTML = '';
        
        const qData = questions[currentIdx];
        const qDiv = document.createElement('div');
        qDiv.className = 'question active';
        
        const qText = document.createElement('div');
        qText.className = 'question-text';
        qText.innerText = qData.q;
        qDiv.appendChild(qText);

        const optionsUl = document.createElement('ul');
        optionsUl.className = 'options';
        
        qData.options.forEach((opt, index) => {
            const li = document.createElement('li');
            li.className = 'option' + (userAnswers[currentIdx] === index ? ' selected' : '');
            li.innerText = opt;
            li.onclick = () => selectOption(index);
            optionsUl.appendChild(li);
        });
        
        qDiv.appendChild(optionsUl);
        quizArea.appendChild(qDiv);

        document.getElementById('prev-btn').disabled = currentIdx === 0;
        document.getElementById('next-btn').innerText = currentIdx === questions.length - 1 ? 'ส่งคำตอบ' : 'ถัดไป';
    }

    function selectOption(idx) {
        userAnswers[currentIdx] = idx;
        displayQuestion();
    }

    function changeQuestion(step) {
        if (step === 1 && userAnswers[currentIdx] === null) {
            alert('กรุณาเลือกคำตอบก่อนไปข้อถัดไป');
            return;
        }

        if (currentIdx === questions.length - 1 && step === 1) {
            showResult();
            return;
        }

        currentIdx += step;
        displayQuestion();
    }

    function showResult() {
        let score = 0;
        questions.forEach((q, i) => {
            if (userAnswers[i] === q.ans) score++;
        });

        document.getElementById('quiz-area').style.display = 'none';
        document.querySelector('.controls').style.display = 'none';
        const resultArea = document.getElementById('result-area');
        resultArea.style.display = 'block';
        document.getElementById('score-text').innerText = `${score} / ${questions.length}`;
    }

    displayQuestion();
</script>

</body>
</html>
