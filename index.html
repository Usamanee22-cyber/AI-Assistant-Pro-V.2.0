<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIPA-S-Audit Financial Calculator</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Kanit', sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 900px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .card {
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            transition: transform 0.3s;
        }

        .card:hover { transform: translateY(-5px); }

        /* ฝั่งสถาบัน: ม่วง-ทอง */
        .institute-card {
            background: linear-gradient(135deg, #4b0082, #6a0dad);
            color: #ffd700;
            border: 2px solid #ffd700;
        }

        /* ฝั่งสมาคม: ทอง-น้ำเงิน */
        .association-card {
            background: linear-gradient(135deg, #ffd700, #ffcc00);
            color: #003399;
            border: 2px solid #003399;
        }

        h2 { text-align: center; margin-bottom: 25px; text-transform: uppercase; }

        .input-group { margin-bottom: 20px; }

        label { display: block; margin-bottom: 8px; font-weight: 500; }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            font-size: 18px;
            box-sizing: border-box;
        }

        .result-box {
            margin-top: 25px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            border: 1px dashed;
        }

        .result-label { font-size: 14px; opacity: 0.9; }
        .result-value { font-size: 28px; font-weight: 700; display: block; margin-top: 5px; }

        @media (max-width: 768px) {
            .container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <h1 style="color: #333; margin-bottom: 30px;">ระบบประมาณการงบประมาณ AIPA-S-Audit</h1>

    <div class="container">
        <div class="card institute-card">
            <h2>สถาบัน สสนช.</h2>
            <div class="input-group">
                <label>จำนวนนิสิตผู้สมัคร (คน)</label>
                <input type="number" id="studentCount" placeholder="ระบุจำนวนเด็กปี 1" oninput="calculateAll()">
            </div>
            
            <div class="result-box">
                <span class="result-label">รายได้สุทธิส่วนบุคคล (หลังหักภาษีและงบ 15ล.)</span>
                <span class="result-value" id="netProfit">0.00</span>
                <p style="font-size: 12px; margin-top: 10px;">*หักส่วนแบ่งสมาคม 35%, ภาษี 35%, และงบดำเนินงาน 15,000,000 บาท</p>
            </div>
        </div>

        <div class="card association-card">
            <h2>สมาคม ทปอ.</h2>
            <div class="result-box" style="background: rgba(0, 51, 153, 0.05);">
                <span class="result-label">ส่วนแบ่งรายได้สมาคม (ก่อนภาษี)</span>
                <span class="result-value" id="assocRaw">0.00</span>
            </div>
            <div class="result-box" style="background: rgba(0, 51, 153, 0.1);">
                <span class="result-label">รายได้สุทธิสมาคม (หลังหักภาษี 35%)</span>
                <span class="result-value" id="assocNet">0.00</span>
            </div>
        </div>
    </div>

    <script>
        function calculateAll() {
            const count = document.getElementById('studentCount').value || 0;
            const fee = 100;
            const totalRevenue = count * fee;

            // 1. คำนวณส่วนของสมาคม (35% ของยอดรวม)
            const assocShareRaw = totalRevenue * 0.35;
            const assocShareNet = assocShareRaw * (1 - 0.35); // หักภาษี 35%

            // 2. คำนวณส่วนของสถาบัน (สูตรบอส: [(รวม-35%)-35%]-15ล้าน)
            const remainingAfterAssoc = totalRevenue - assocShareRaw; // คือ 65% แรก
            const afterTax = remainingAfterAssoc * (1 - 0.35); // หักภาษี 35% ของส่วนที่เหลือ
            const netInstitute = afterTax - 15000000; // หักงบ 10ล + 5ล

            // แสดงผล
            document.getElementById('assocRaw').innerText = assocShareRaw.toLocaleString(undefined, {minimumFractionDigits: 2});
            document.getElementById('assocNet').innerText = assocShareNet.toLocaleString(undefined, {minimumFractionDigits: 2});
            
            const netProfitElement = document.getElementById('netProfit');
            netProfitElement.innerText = netInstitute.toLocaleString(undefined, {minimumFractionDigits: 2});
            
            // ถ้าติดลบให้แสดงสีแดง
            netProfitElement.style.color = netInstitute < 0 ? "#ff4d4d" : "#ffd700";
        </div>
    </script>

</body>
</html>
